services:
  db:
    image: postgres:15-alpine
    container_name: dns-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dns_hub}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dns-hub-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 8080
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-dns_hub}
      DATABASE_USER: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8080}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      DEV_LOGIN_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./server:/app
      - server_uploads:/app/uploads
    depends_on:
      - db

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dns-hub-web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      VITE_BACKEND_ORIGIN: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - server

volumes:
  pgdata:
  web_node_modules:
  server_uploads:
